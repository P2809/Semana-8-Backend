<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tickets de Soporte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">
        <header class="text-center mb-5">
            <h1 class="display-5 fw-bold text-primary">Sistema Backend de Tickets</h1>
            <p class="text-muted">Integración de Node.js, Express, MySQL y Bootstrap</p>
        </header>

        <div class="row g-4">
            <div class="col-md-5">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white py-3">
                        <h5 class="mb-0">Crear Nuevo Ticket</h5>
                    </div>
                    <div class="card-body p-4">
                        <form id="ticketForm">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Nombre</label>
                                <input type="text" id="nombre" class="form-control" placeholder="Tu nombre" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Correo Electrónico</label>
                                <input type="email" id="correo" class="form-control" placeholder="nombre@correo.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Asunto</label>
                                <input type="text" id="asunto" class="form-control" placeholder="Motivo de la consulta" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mensaje</label>
                                <textarea id="mensaje" class="form-control" rows="4" placeholder="Describe tu requerimiento..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Enviar Ticket</button>
                        </form>
                        <div id="alertContainer" class="mt-3"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-dark text-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Historial de Tickets en BD</h5>
                        <button id="btnActualizar" class="btn btn-sm btn-outline-light">Actualizar</button>
                    </div>
                    <div class="card-body p-4">
                        <div id="ticketsList" class="row g-3">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ticketForm = document.getElementById('ticketForm');
        const ticketsList = document.getElementById('ticketsList');
        const btnActualizar = document.getElementById('btnActualizar');
        const alertContainer = document.getElementById('alertContainer');

        // Función para cargar los tickets (GET)
        async function cargarTickets() {
            try {
                const response = await fetch('/api/tickets');
                const data = await response.json();
                
                ticketsList.innerHTML = '';
                if(data.length === 0) {
                    ticketsList.innerHTML = '<p class="text-muted text-center">No hay tickets registrados.</p>';
                    return;
                }

                data.forEach(ticket => {
                    const card = `
                        <div class="col-12">
                            <div class="card border-start border-primary border-4 shadow-sm">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <h6 class="card-title fw-bold text-secondary mb-1">${ticket.asunto}</h6>
                                        <span class="badge bg-light text-dark small">${new Date(ticket.fecha_creacion).toLocaleDateString()}</span>
                                    </div>
                                    <p class="card-text text-muted small mb-2">${ticket.mensaje}</p>
                                    <div class="text-end small text-primary fw-semibold">— ${ticket.nombre} (${ticket.correo})</div>
                                </div>
                            </div>
                        </div>
                    `;
                    ticketsList.innerHTML += card;
                });
            } catch (error) {
                console.error("Error al cargar:", error);
            }
        }

        // Evento para guardar ticket (POST)
        ticketForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nuevoTicket = {
                nombre: document.getElementById('nombre').value,
                correo: document.getElementById('correo').value,
                asunto: document.getElementById('asunto').value,
                mensaje: document.getElementById('mensaje').value
            };

            try {
                const response = await fetch('/api/tickets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuevoTicket)
                });

                const resultado = await response.json();

                if (response.ok) {
                    alertContainer.innerHTML = `<div class="alert alert-success m-0" role="alert">¡Ticket creado con éxito! (ID: ${resultado.id})</div>`;
                    ticketForm.reset();
                    cargarTickets();
                } else {
                    alertContainer.innerHTML = `<div class="alert alert-danger m-0" role="alert">${resultado.error}</div>`;
                }
            } catch (error) {
                alertContainer.innerHTML = `<div class="alert alert-danger m-0" role="alert">Error al conectar con el servidor.</div>`;
            }
        });

        btnActualizar.addEventListener('click', cargarTickets);
        window.addEventListener('DOMContentLoaded', cargarTickets);
    </script>
</body>
</html>
